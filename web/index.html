<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATM Network Monitor</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">ATM<strong>Net</strong></span>
      </div>
      <div class="header-meta">
        <span class="subtitle">Network Operations Dashboard</span>
        <span class="live-badge"><span class="pulse-dot"></span>LIVE</span>
      </div>
    </div>
    <div class="header-right">
      <div class="refresh-info">
        <span class="refresh-label">Next refresh in</span>
        <span class="refresh-countdown" id="countdown">3s</span>
      </div>
      <div class="header-stats">
        <div class="stat-pill" id="stat-total">
          <span class="stat-num">—</span>
          <span class="stat-lbl">Transactions</span>
        </div>
        <div class="stat-pill" id="stat-alerts">
          <span class="stat-num">—</span>
          <span class="stat-lbl">Alerts</span>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- Alert Banner -->
    <section class="alert-section" id="alert-section" style="display:none">
      <div class="alert-header">
        <span class="alert-icon">⚠</span>
        <span class="alert-title">Suspicious Activity Detected</span>
      </div>
      <div class="alert-list" id="alert-list"></div>
    </section>

    <!-- ATM Cards -->
    <section class="section">
      <h2 class="section-title">ATM Status Overview</h2>
      <div class="atm-grid" id="atm-grid">
        <div class="atm-card skeleton"></div>
        <div class="atm-card skeleton"></div>
        <div class="atm-card skeleton"></div>
      </div>
    </section>

    <!-- Transactions -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Recent Transactions</h2>
        <span class="section-badge" id="tx-count">Loading…</span>
      </div>
      <div class="table-wrap">
        <table class="tx-table" id="tx-table">
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>ATM ID</th>
              <th>Type</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tx-body">
            <tr><td colspan="5" class="loading-row">Loading transactions…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <footer class="footer">
    <span>ATM Network Simulator</span>
    <span class="footer-sep">·</span>
    <span>Data refreshes every 3 seconds</span>
    <span class="footer-sep">·</span>
    <span id="last-update">—</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
